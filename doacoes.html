<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doações - APROBEMGV</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#F97316',
                        secondary: '#8B5CF6',
                        accent: '#10B981',
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="min-h-screen bg-gradient-to-br from-orange-50 via-pink-50 to-purple-50 font-sans text-gray-800">

    <main class="flex flex-col items-center justify-center min-h-screen px-4 py-12">

        <div class="bg-white/80 backdrop-blur-sm rounded-3xl shadow-xl shadow-orange-200/30 p-8 md:p-12 max-w-lg w-full text-center transition-all duration-300 hover:shadow-2xl hover:shadow-orange-300/30">

            <div class="mb-8">
                <img src="images/logo aprobem.jpg" alt="Logo APROBEMGV"
                    class="w-24 h-24 md:w-28 md:h-28 mx-auto rounded-full shadow-lg shadow-purple-200/50 border-4 border-white">
                <h1 class="mt-5 text-2xl md:text-3xl font-bold text-gray-800">Faça sua doação</h1>
                <p class="mt-3 text-sm md:text-base text-gray-500 leading-relaxed">
                    Sua doação ajuda a salvar vidas. Com o valor de uma refeição, você pode alimentar um animal resgatado por um mês inteiro.
                </p>
            </div>

            <div class="bg-gradient-to-r from-green-50 to-emerald-50 rounded-2xl p-6 mb-8 border border-green-100">
                <div class="flex items-center justify-center gap-2 mb-3">
                    <svg class="w-8 h-8 text-accent" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                    </svg>
                    <span class="text-lg font-bold text-green-700">Via Pix</span>
                </div>
                <p class="text-sm text-gray-600">Rápido, seguro e sem taxas. Use qualquer chave Pix abaixo.</p>
            </div>

            <a href="pix.html"
                class="block w-full bg-gradient-to-r from-primary to-orange-400 text-white font-bold py-4 px-6 rounded-2xl shadow-md shadow-orange-200/50 transition-all duration-300 hover:scale-[1.03] hover:shadow-lg hover:shadow-orange-300/50 active:scale-[0.98] mb-4">
                Doar via Pix
            </a>

            <a href="index.html"
                class="inline-flex items-center gap-2 text-gray-400 hover:text-gray-600 transition-colors duration-200 text-sm font-medium">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
                </svg>
                Voltar para a página principal
            </a>

        </div>

    </main>

</body>

</html>
